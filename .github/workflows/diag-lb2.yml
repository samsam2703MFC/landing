name: Diag root livraison-bureau

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: What does the server serve at the old URL now
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            D=/var/www/latelierby-landing
            cd "$D"
            echo "=== deployed commit ==="; git log --oneline -1
            echo "=== git status (untracked/modified in root?) ==="; git status --porcelain=v1 | grep -iE "livraison|evenement|office|b2b" || echo "(clean re: landing pages)"
            echo ""
            echo "=== root livraison-bureau.html: redirect or full page? ==="
            ls -la "$D/livraison-bureau.html"
            grep -oiE "http-equiv=\"refresh\"|<div id=\"root\">|livraison-bureau.jsx[^\"]*" "$D/livraison-bureau.html" | head
            echo ""
            echo "=== does root still have a livraison-bureau.jsx? (should be GONE) ==="
            ls -la "$D/livraison-bureau.jsx" 2>/dev/null || echo "  (absent — good)"
            echo ""
            echo "=== HTTP served ==="
            for u in "/livraison-bureau.html" "/livraison-bureau.jsx" "/office/livraison-bureau.html" "/office/livraison-bureau.jsx"; do
              printf "  %-34s %s\n" "$u" "$(curl -s -o /dev/null -w '%{http_code}' "http://localhost/landing$u")"
            done
            echo "--- first line the server returns for the old URL ---"
            curl -s "http://localhost/landing/livraison-bureau.html" | grep -oiE "http-equiv=\"refresh\"|<div id=\"root\">" | head -1
            echo "--- Cache-Control header on the old URL ---"
            curl -sI "http://localhost/landing/livraison-bureau.html" | grep -i "cache-control" || echo "(none)"
