name: Diagnose landing path

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Show existing .htaccess and leftovers
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            D=/var/www/latelierby-landing

            echo "=== .htaccess in $D (if any) ==="
            if [ -f "$D/.htaccess" ]; then cat "$D/.htaccess"; else echo "(none)"; fi

            echo ""
            echo "=== Root .htaccess /var/www/latelierby-landing vs any parent ==="
            ls -la "$D/.htaccess" 2>/dev/null || true

            echo ""
            echo "=== mod_headers / mod_expires enabled? ==="
            apache2ctl -M 2>/dev/null | grep -iE "headers|expires|rewrite" || true

            echo ""
            echo "=== Leftover untracked files (old prototype?) ==="
            ls -la "$D/livraison-bureau.js" "$D/webshop-landing-b2b.js" 2>/dev/null || true
            echo "--- head of livraison-bureau.js (leftover) ---"
            head -2 "$D/livraison-bureau.js" 2>/dev/null || echo "(none)"
