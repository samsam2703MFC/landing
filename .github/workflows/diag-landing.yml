name: Diagnose landing path

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect jsx version + cache headers
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            D=/var/www/latelierby-landing

            echo "=== git state in $D ==="
            cd "$D" && git log --oneline -1 && git status --porcelain=v1 | head

            echo ""
            echo "=== livraison-bureau.jsx on disk ==="
            ls -la "$D/livraison-bureau.jsx"
            echo -n "line count: "; wc -l < "$D/livraison-bureau.jsx"
            if grep -q "La boulangerie qui vient" "$D/livraison-bureau.jsx"; then
              echo ">>> JSX is the NEW full page"
            else
              echo ">>> JSX is OLD/prototype"
            fi
            echo "--- first 3 lines of the on-disk jsx ---"
            head -3 "$D/livraison-bureau.jsx"

            echo ""
            echo "=== What localhost serves for the JSX (first 3 lines) ==="
            curl -s http://localhost/landing/livraison-bureau.jsx | head -3

            echo ""
            echo "=== Does the SERVED jsx contain the new hero string? ==="
            curl -s http://localhost/landing/livraison-bureau.jsx | grep -c "La boulangerie qui vient" || echo 0

            echo ""
            echo "=== Response headers for html + jsx (caching) ==="
            curl -sI http://localhost/landing/livraison-bureau.html | grep -iE "HTTP/|cache-control|etag|last-modified|expires"
            echo "---"
            curl -sI http://localhost/landing/livraison-bureau.jsx | grep -iE "HTTP/|cache-control|etag|last-modified|expires"

            echo ""
            echo "=== First 40 lines of the SERVED html ==="
            curl -s http://localhost/landing/livraison-bureau.html | head -40
