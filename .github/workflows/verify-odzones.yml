name: Check landing data source

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Are the editorial lp_od_* tables populated?
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            F=/var/www/latelierby-landing/lp_api.php
            DBN=$(grep -oP "LP_DB_NAME'\s*,\s*'\K[^']+" "$F" | head -1)
            DBU=$(grep -oP "LP_DB_USER'\s*,\s*'\K[^']+" "$F" | head -1)
            export MYSQL_PWD=$(grep -oP "LP_DB_PASS'\s*,\s*'\K[^']+" "$F" | head -1)

            echo "=== Row counts of the editorial lp_od_* tables ==="
            for t in lp_od_i18n lp_od_list lp_od_shops lp_od_zones lp_od_usecases \
                     lp_od_steps lp_od_rollout lp_od_offers lp_od_products lp_od_specs \
                     lp_od_testimonials lp_od_faqs lp_od_form_fields; do
              n=$(mysql -u "$DBU" "$DBN" -N -e "SELECT COUNT(*) FROM $t" 2>/dev/null)
              if [ -z "$n" ]; then n="(table absente)"; fi
              printf "  %-22s %s\n" "$t" "$n"
            done

            echo ""
            echo "=== What ?r=od actually returns (array sizes) ==="
            curl -s "http://localhost/landing/lp_api.php?r=od" \
              | php -r '$d=json_decode(file_get_contents("php://stdin"),true); if(!$d){echo "  (vide / erreur)\n";exit;} foreach($d as $k=>$v){echo "  $k: ".(is_array($v)?count($v):json_encode($v))."\n";} echo "  i18n.fr keys: ".(isset($d["i18n"]["fr"])?count($d["i18n"]["fr"]):0)."\n";'
