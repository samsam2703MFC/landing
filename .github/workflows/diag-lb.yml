name: Diag livraison-bureau state

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: What is served for livraison-bureau.html
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            D=/var/www/latelierby-landing
            cd "$D"
            echo "=== git: deployed commit + modified tracked files ==="
            git log --oneline -1
            git status --porcelain=v1 | head -30

            echo ""
            echo "=== livraison-bureau.html on disk ==="
            ls -la "$D/livraison-bureau.html"
            echo "--- which JS/JSX does it load? ---"
            grep -oE 'src="[^"]+\.(jsx|js)"' "$D/livraison-bureau.html" || echo "(no script src found)"
            echo "--- title / any b2b marker? ---"
            grep -oiE "<title>[^<]*</title>|b2b|contact" "$D/livraison-bureau.html" | head

            echo ""
            echo "=== What localhost serves (first 30 lines) ==="
            curl -s "http://localhost/landing/livraison-bureau.html" | head -30

            echo ""
            echo "=== b2b leftovers in the dir ==="
            ls -la "$D"/*b2b* 2>/dev/null || echo "(none matching *b2b*)"
