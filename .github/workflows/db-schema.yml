name: DB sample (delivery config)

on:
  workflow_dispatch:

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - name: Sample delivery-config tables (no personal data)
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            F=/var/www/latelierby-landing/lp_api.php
            DBN=$(grep -oP "LP_DB_NAME'\s*,\s*'\K[^']+" "$F" | head -1)
            DBU=$(grep -oP "LP_DB_USER'\s*,\s*'\K[^']+" "$F" | head -1)
            export MYSQL_PWD=$(grep -oP "LP_DB_PASS'\s*,\s*'\K[^']+" "$F" | head -1)
            q(){ mysql -u "$DBU" "$DBN" -t -e "$1"; }

            echo "########## shops ##########"
            q "SELECT id,name,city,region,zone,active,landing_enabled,webshop_enabled FROM shops ORDER BY sort_order;"

            echo "########## ws_delivery_zones ##########"
            q "SELECT id,name,shop_id,zone_type,catchment_id,active,sort_order,LEFT(postcodes,70) AS postcodes FROM ws_delivery_zones ORDER BY sort_order,id;"

            echo "########## ws_franchisor_catchment ##########"
            q "SELECT id,name,shop_id,exclusive,active,LEFT(postcodes,70) AS postcodes FROM ws_franchisor_catchment ORDER BY id;"

            echo "########## ws_tours ##########"
            q "SELECT id,shop_id,zone_id,zone_secondary,name,max_items,active FROM ws_tours ORDER BY shop_id,id;"

            echo "########## ws_tour_availability ##########"
            q "SELECT id,tour_id,shop_id,delivery_day,delivery_start,delivery_end,cutoff_time,window_label,active FROM ws_tour_availability ORDER BY tour_id,delivery_day;"

            echo "########## ws_tour_zones ##########"
            q "SELECT * FROM ws_tour_zones LIMIT 40;"

            echo "########## ws_tour_postcodes (count + sample) ##########"
            q "SELECT COUNT(*) AS n FROM ws_tour_postcodes;"
            q "SELECT * FROM ws_tour_postcodes ORDER BY tour_id LIMIT 10;"

            echo "########## ws_zone_requests (structure check: count only) ##########"
            q "SELECT COUNT(*) AS n, MIN(created_at) AS first, MAX(created_at) AS last FROM ws_zone_requests;"
