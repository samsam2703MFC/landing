name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            PROJECT=/var/www/latelierby-landing
            cd "$PROJECT"

            # Git refuses to operate on a root-owned tree it doesn't "trust".
            git config --global --add safe.directory "$PROJECT"

            # Deterministic deploy: force the working tree to match origin/main.
            # A plain `git pull` aborts (and leaves stale files live) whenever the
            # server copy has diverged — local edits, a half-finished merge, or a
            # tracked file that now conflicts. fetch + reset --hard can't get stuck.
            # It only touches TRACKED files, so DB-uploaded images and other
            # untracked assets in the tree are left untouched.
            git fetch origin main
            git reset --hard origin/main

            echo "=== Deployed commit ==="
            git log --oneline -1

            # The repo's .htaccess ships a no-cache policy for html/js/css so
            # browsers always revalidate after a redeploy — but it lives inside
            # <IfModule mod_headers.c>/<IfModule mod_expires.c> and is silently
            # skipped unless those modules are loaded. Without it, no
            # Cache-Control header is sent and visitors keep seeing a stale
            # cached page. Enabling them is idempotent, so the deploy self-heals.
            echo "=== Ensure mod_headers + mod_expires are enabled ==="
            if a2enmod headers expires 2>&1 | grep -qiE "enabling|to activate"; then
              echo "modules newly enabled -> reloading apache"
              systemctl reload apache2 || apache2ctl graceful || true
            else
              echo "modules already enabled"
            fi

            echo "=== Smoke test (status + cache header) ==="
            curl -s -o /dev/null -w "landing HTTP %{http_code}\n" http://localhost/landing/livraison-bureau.html
            echo -n "Cache-Control: "
            curl -sI http://localhost/landing/livraison-bureau.html | grep -i "cache-control" || echo "(none - modules may need a manual reload)"
