name: Fix server (emergency restore)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Restore site at /landing/
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # Détection serveur web
            if command -v apache2 &>/dev/null; then WEB=apache; else WEB=nginx; fi
            echo ">>> Serveur : $WEB"

            PROJECT=/var/www/latelierby-landing
            mkdir -p "$PROJECT"
            git config --global --add safe.directory "$PROJECT"

            # Clone ou pull
            if [ ! -d "$PROJECT/.git" ]; then
              git clone https://github.com/samsam2703MFC/landing.git "$PROJECT"
            else
              cd "$PROJECT" && git pull origin main
            fi

            # ── Apache : Alias /landing → dossier projet ─────────
            if [ "$WEB" = "apache" ]; then
              cat > /etc/apache2/conf-available/latelierby-landing.conf << 'EOF'
Alias /landing /var/www/latelierby-landing

<Directory /var/www/latelierby-landing>
    AllowOverride All
    Require all granted
    Options -Indexes
    DirectoryIndex index.html index.php
</Directory>
EOF
              a2enconf latelierby-landing
              # S'assurer que le site par défaut est actif (PHPMyAdmin, Roundcube, etc.)
              a2ensite 000-default.conf 2>/dev/null || true
              apache2ctl configtest && systemctl reload apache2
              echo ">>> Apache : /landing/ configuré"
            fi

            # ── Nginx : location /landing/ ────────────────────────
            if [ "$WEB" = "nginx" ]; then
              PHP_SOCK=$(ls /var/run/php/php*-fpm.sock 2>/dev/null | sort -V | tail -1)
              PHP_SOCK=${PHP_SOCK:-/var/run/php/php8.2-fpm.sock}

              SNIP=/etc/nginx/snippets/latelierby-landing.conf
              cat > "$SNIP" << NGINXEOF
location /landing/ {
    alias /var/www/latelierby-landing/;
    index index.html index.php;
    try_files \$uri \$uri/ /landing/index.html;
}

location ~ ^/landing/(.+\.php)$ {
    fastcgi_param SCRIPT_FILENAME /var/www/latelierby-landing/\$1;
    fastcgi_param SCRIPT_NAME /landing/\$1;
    include fastcgi_params;
    fastcgi_pass unix:$PHP_SOCK;
}
NGINXEOF

              # Inclure le snippet dans le default server block s'il n'y est pas
              DEFAULT=/etc/nginx/sites-available/default
              if ! grep -q "latelierby-landing" "$DEFAULT"; then
                sed -i '/^}$/i\\tinclude snippets/latelierby-landing.conf;' "$DEFAULT"
              fi

              nginx -t && systemctl reload nginx
              echo ">>> Nginx : /landing/ configuré"
            fi

            echo ""
            echo "✓ Site accessible sur http://185.180.206.46/landing/"
            ls "$PROJECT" | head -10
