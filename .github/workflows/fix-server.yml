name: Fix server (emergency restore)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Create IP catch-all VirtualHost
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            CONF=/etc/apache2/sites-available/000-ip-catchall.conf

            {
              echo '<VirtualHost *:80>'
              echo '    ServerName 185.180.206.46'
              echo '    DocumentRoot /var/www/html'
              echo '    Alias /landing /var/www/latelierby-landing'
              echo '    <Directory /var/www/latelierby-landing>'
              echo '        AllowOverride All'
              echo '        Require all granted'
              echo '        Options -Indexes'
              echo '        DirectoryIndex index.html index.php'
              echo '    </Directory>'
              echo '</VirtualHost>'
            } > "$CONF"

            echo "=== Fichier créé ==="
            cat "$CONF"

            a2ensite 000-ip-catchall
            echo "=== sites-enabled ==="
            ls /etc/apache2/sites-enabled/ | grep catchall

            apache2ctl configtest
            systemctl reload apache2

            echo "=== Test URL ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://185.180.206.46/landing/
