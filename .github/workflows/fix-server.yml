name: Fix server (emergency restore)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Add /landing/ alias to Apache
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Créer le conf Alias (nom différent pour éviter conflit avec sites-enabled)
            {
              echo 'Alias /landing /var/www/latelierby-landing'
              echo ''
              echo '<Directory /var/www/latelierby-landing>'
              echo '    AllowOverride All'
              echo '    Require all granted'
              echo '    Options -Indexes'
              echo '    DirectoryIndex index.html index.php'
              echo '</Directory>'
            } > /etc/apache2/conf-available/latelierby-alias.conf

            a2enconf latelierby-alias
            apache2ctl configtest
            systemctl reload apache2

            echo "Done — test: http://185.180.206.46/landing/"
