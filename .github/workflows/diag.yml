name: Diagnose server

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check server state
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== sites-enabled ==="
            ls /etc/apache2/sites-enabled/

            echo ""
            echo "=== 000-default.conf ==="
            cat /etc/apache2/sites-available/000-default.conf 2>/dev/null || echo "ABSENT"

            echo ""
            echo "=== configtest ==="
            apache2ctl configtest 2>&1

            echo ""
            echo "=== curl localhost/landing/ ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost/landing/

            echo ""
            echo "=== error.log (5 dernieres lignes) ==="
            tail -5 /var/log/apache2/error.log 2>/dev/null
