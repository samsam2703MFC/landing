name: Diagnose server

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check redirects and htaccess
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== curl verbose /landing/ ==="
            curl -v http://localhost/landing/ 2>&1 | grep -E "< HTTP|< Location|> GET|< Set-Cookie"

            echo ""
            echo "=== .htaccess dans latelierby-landing ==="
            cat /var/www/latelierby-landing/.htaccess 2>/dev/null || echo "ABSENT"

            echo ""
            echo "=== latelierby-landing.conf (sites-enabled) ==="
            cat /etc/apache2/sites-enabled/latelierby-landing.conf 2>/dev/null || echo "ABSENT"

            echo ""
            echo "=== conf-enabled ==="
            ls /etc/apache2/conf-enabled/

            echo ""
            echo "=== latelierby-alias.conf ==="
            cat /etc/apache2/conf-available/latelierby-alias.conf 2>/dev/null || echo "ABSENT"
