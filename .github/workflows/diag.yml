name: Diagnose server

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Find Roundcube SMTP config
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== Roundcube config ==="
            grep -r "smtp_server\|smtp_port\|smtp_user" /var/www/html/roundcube/config/ 2>/dev/null \
              || grep -r "smtp_server\|smtp_port" /etc/roundcube/ 2>/dev/null \
              || find / -name "config.inc.php" -path "*/roundcube/*" 2>/dev/null | head -3 | xargs grep -l "smtp" 2>/dev/null

            echo ""
            echo "=== Ports mail ouverts ==="
            ss -tlnp | grep -E ":25|:465|:587|:993|:143"

            echo ""
            echo "=== Postfix actif ? ==="
            systemctl is-active postfix 2>/dev/null || echo "non"
