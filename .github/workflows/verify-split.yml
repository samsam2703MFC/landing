name: Verify office/b2b split

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check new sub-folder URLs + redirects
        uses: appleboy/ssh-action@v1
        with:
          host: 185.180.206.46
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            base=http://localhost/landing
            echo "=== HTTP status ==="
            for u in "/office/livraison-bureau.html" "/office/livraison-bureau.jsx" \
                     "/office/livraison-bureau.css" "/b2b/evenements-b2b.html" \
                     "/b2b/webshop-landing-b2b.js" "/b2b/webshop-landing-b2b.css" \
                     "/livraison-bureau.html" "/evenements-b2b.html" \
                     "/img/brand/logo.png" "/assets/logo-white.png" \
                     "/lp_api.php?r=od_zones" "/lp_office_lead.php"; do
              printf "  %-38s %s\n" "$u" "$(curl -s -o /dev/null -w '%{http_code}' "$base$u")"
            done
            echo "=== redirects point to the sub-folders ? ==="
            curl -s "$base/livraison-bureau.html" | grep -oE "/landing/office/livraison-bureau.html" | head -1
            curl -s "$base/evenements-b2b.html"   | grep -oE "/landing/b2b/evenements-b2b.html" | head -1
            echo "=== office app still references its jsx + office-lead ? ==="
            curl -s "$base/office/livraison-bureau.html" | grep -oE "livraison-bureau.jsx[^\"]*" | head -1
            curl -s "$base/office/livraison-bureau.jsx" | grep -c "lp_office_lead.php" | xargs echo "office-lead calls:"
